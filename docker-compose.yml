services:
  postgres:
    container_name: postgres
    image: postgres:latest
    restart: unless-stopped
    shm_size: 256mb
    ports:
      - '5432:5432'
    volumes:
      - ${STORAGE_DIR}/postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      retries: 5
      timeout: 10s
    networks:
      - lancache

  storage:
    container_name: storage
    image: djosmer/lancache-storage:latest
    restart: unless-stopped
    ports:
      - '8080:80'
    volumes:
      - ${STORAGE_DIR}:/data/storage
      - ${LOGS_DIR}:/app/logs
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost/status || exit 1']
      interval: 10s
      retries: 5
      timeout: 10s
    networks:
      - lancache
#    dns:
#      - 8.8.8.8
#      - 9.9.9.9

  storage-watch:
    container_name: storage-watch
    image: djosmer/lancache-storage:latest
    volumes:
      - ${STORAGE_DIR}:/data/storage
    env_file:
      - .env
    depends_on:
      storage:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - lancache
    restart: unless-stopped
    command: ["node", "build/tools/storage-watch-prisma.js"]

  nginx:
    container_name: nginx
    image: djosmer/lancache-nginx:latest
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ${STORAGE_DIR}:/data/storage
      - ${LOGS_DIR}:/data/logs
    env_file:
      - .env
    depends_on:
      - storage
    networks:
      - lancache
#    dns:
#      - 8.8.8.8
#      - 9.9.9.9

networks:
  lancache:
    name: lancache
