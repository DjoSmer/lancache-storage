user nginx;
worker_processes auto;

pid /var/run/nginx.pid;

events {
  worker_connections 1024;
  multi_accept on;
  use epoll;
}

http {
  aio threads;
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;

  include mime.types;
  default_type application/octet-stream;

  access_log /data/logs/main-access.log combined if=$loggable;
  error_log /data/logs/main-error.log;

  gzip on;

  include conf.d/*.conf;
  include http.d/*.conf;
}

stream {
  include conf.d/*.conf;
  include stream.d/*.conf;
}                                       

