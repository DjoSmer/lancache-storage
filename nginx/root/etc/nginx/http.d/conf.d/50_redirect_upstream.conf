location @download_from_storage {
    internal;
    set $file_path $upstream_http_location;

    add_header Location "";
    add_header X-Lancache-Status "HIT";

    try_files $file_path @download_from_host;
}

location @download_from_host {
    internal;
    add_header X-Lancache-Status "MISS";

    proxy_pass http://$host$request_uri;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_pass_header *;
    proxy_redirect off;
}
