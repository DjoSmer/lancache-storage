root /data/storage;

location / {
    error_page 302 = @download_from_storage;
    error_page 404 502 = @download_from_host;

    proxy_pass http://NGINX_STORAGE_HOST$request_uri;
    proxy_redirect off;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_intercept_errors on;
}
